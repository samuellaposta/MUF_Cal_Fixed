name: Build Windows Installer
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '5.15.2'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_mingw81'

      - name: Build
        shell: cmd
        run: |
          mkdir build
          cd build
          qmake ..\MUFCalc\MUFCalc.pro CONFIG+=release
          mingw32-make -j4

      - name: Debug Qt paths
        shell: cmd
        run: |
          echo Qt5_Dir=%Qt5_Dir%
          where windeployqt
          dir "%Qt5_Dir%\bin\windeployqt.exe"

      - name: Deploy Qt dependencies
        shell: cmd
        run: |
          mkdir deploy
          copy build\release\MUFCalc.exe deploy\
          "%Qt5_Dir%\bin\windeployqt.exe" --release --dir deploy deploy\MUFCalc.exe

      - name: Build Installer
        shell: cmd
        run: |
          choco install innosetup -y
          iscc installer.iss

      - name: Upload Installer
        uses: actions/upload-artifact@v4
        with:
          name: MUFCalc-Installer
          path: Output\MUFCalcSetup.exe
