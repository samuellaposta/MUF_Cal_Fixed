name: Build Windows Installer
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '5.15.2'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_mingw81'

      - name: Build
        shell: cmd
        run: |
          mkdir build
          cd build
          qmake ..\MUFCalc\MUFCalc.pro CONFIG+=release
          mingw32-make -j4

      - name: Deploy Qt dependencies
        shell: cmd
        run: |
          set QTDIR=D:\a\MUF_Cal_Fixed\Qt\5.15.2\mingw81_64
          mkdir deploy\platforms
          copy build\release\MUFCalc.exe deploy\
          copy "%QTDIR%\bin\Qt5Core.dll" deploy\
          copy "%QTDIR%\bin\Qt5Gui.dll" deploy\
          copy "%QTDIR%\bin\Qt5Widgets.dll" deploy\
          copy "%QTDIR%\bin\Qt5Network.dll" deploy\
          copy "%QTDIR%\plugins\platforms\qwindows.dll" deploy\platforms\
          copy "%QTDIR%\bin\libgcc_s_seh-1.dll" deploy\
          copy "%QTDIR%\bin\libstdc++-6.dll" deploy\
          copy "%QTDIR%\bin\libwinpthread-1.dll" deploy\

      - name: Build Installer
        shell: cmd
        run: |
          choco install innosetup -y
          copy MUFCalc\resources\MUFCalc.ico MUFCalc.ico
          iscc installer.iss

      - name: Upload Installer
        uses: actions/upload-artifact@v4
        with:
          name: MUFCalc-Installer
          path: Output\MUFCalcSetup.exe

